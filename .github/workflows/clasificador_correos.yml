name: Clasificador de Correos

on:
  # Botón manual "Run workflow" en GitHub -> para probarlo cuando quieras.
  workflow_dispatch:
  # Hora fija por ahora (13:00 UTC = 7:00 a.m. CDMX aprox).
  # En el Paso 5 esto se conecta al panel para que la hora sea ajustable.
  schedule:
    - cron: "0 13 * * *"

jobs:
  correr-clasificador:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements_clasificador.txt

      - name: Ejecutar clasificador
        env:
          MAIL_USER_PRINCIPAL: ${{ secrets.MAIL_USER_PRINCIPAL }}
          MAIL_PASS_PRINCIPAL: ${{ secrets.MAIL_PASS_PRINCIPAL }}
          MAIL_USER_ML: ${{ secrets.MAIL_USER_ML }}
          MAIL_PASS_ML: ${{ secrets.MAIL_PASS_ML }}
          MAIL_IMAP_HOST: ${{ secrets.MAIL_IMAP_HOST }}
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python clasificador_correos.py

      - name: Guardar el Excel actualizado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Licitaciones.xlsx
          git diff --staged --quiet || git commit -m "Actualiza Licitaciones.xlsx automáticamente"
          git push
